# Alembic config for the ForgeSOP Platform Admin Console.
#
# This Alembic tree manages the `platform` Postgres schema ONLY. It must
# NEVER emit DDL against `public` — that schema is owned by sop-hub's
# Supabase migration tree. The env.py `include_object` filter enforces this.
#
# The sqlalchemy.url is intentionally left blank; env.py reads DATABASE_URL
# (the service-role connection) from the environment / app settings.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
